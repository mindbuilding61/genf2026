<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:spaceless>
    <f:if condition="{rootline2}">
        <div class="container">
            <ul class="bluemenue">
                <f:for each="{rootline2}" as="rootline2Item">
                    <f:if condition="{rootline2Item.current}">
                        <f:then>
                            <li><span>{rootlineItem.title}</span></li>
                        </f:then>
                        <f:else>
                            <li><a href="{rootline2Item.link}">{rootline2Item.title}</a></li>
                        </f:else>
                    </f:if>
                </f:for>
            </ul>
        </div>
    </f:if>

</f:spaceless>
</html>
