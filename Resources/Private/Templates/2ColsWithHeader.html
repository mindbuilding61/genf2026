<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:layout name="Default"/>
<f:section name="Main">

    <section class="ce-container ce-container--2cols-header">
        <div class="ce-container__header">
            <f:for each="{children_200}" as="record">
                <f:format.raw>{record.renderedContent}</f:format.raw>
            </f:for>
        </div>
        <div class="ce-container__columns row">
            <div class="ce-container__column ce-container__column--left col-md-6">
                <f:for each="{children_201}" as="record">
                    <f:format.raw>{record.renderedContent}</f:format.raw>
                </f:for>
            </div>
            <div class="ce-container__column ce-container__column--right col-md-6">
                <f:for each="{children_202}" as="record">
                    <f:format.raw>{record.renderedContent}</f:format.raw>
                </f:for>
            </div>
        </div>
    </section>

</f:section>
</html>
