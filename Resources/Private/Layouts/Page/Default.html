<f:spaceless>
<div class="main">
    <f:render partial="Mainmenu" arguments="{_all}"/>
</div>
<script>
  (function () {
    function findFirstContentAfterMenu(menuWrapper) {
      if (!menuWrapper) {
        return null;
      }
      let candidate = menuWrapper.nextElementSibling;
      while (candidate && candidate.tagName === 'SCRIPT') {
        candidate = candidate.nextElementSibling;
      }
      return candidate;
    }

    function applyMenuOffset() {
      const nav = document.querySelector('.navbar.fixed-top');
      const menuWrapper = document.querySelector('.main');
      const firstContent = findFirstContentAfterMenu(menuWrapper);
      if (!firstContent) {
        return;
      }

      if (!nav) {
        firstContent.style.marginTop = '';
        return;
      }

      const menuHeight = Math.ceil(nav.getBoundingClientRect().height);
      firstContent.style.marginTop = menuHeight > 0 ? menuHeight + 'px' : '';
      document.documentElement.style.setProperty('--menuHeight', menuHeight + 'px');
    }

    window.addEventListener('load', applyMenuOffset);
    window.addEventListener('resize', applyMenuOffset);
    window.setTimeout(applyMenuOffset, 50);
    window.setTimeout(applyMenuOffset, 300);
  })();
</script>
