<script>
  (function () {
    /** Offset for Bootstrap fixed navbar: push page content down without relying on brittle “first sibling” markup. Also fixes anchors like #c1 under the sticky header (scroll-margin / scroll-padding). */
    function applyMenuOffset() {
      const nav = document.querySelector('nav.navbar.fixed-top');
      const menuHeightRaw = nav ? nav.getBoundingClientRect().height : 0;
      const menuHeight = Math.ceil(menuHeightRaw);

      if (!nav || menuHeight <= 0) {
        document.body.style.paddingTop = '';
        document.documentElement.style.scrollPaddingTop = '';
        document.documentElement.style.setProperty('--menuHeight', '');
        return;
      }

      const px = menuHeight + 'px';
      document.body.style.paddingTop = px;
      document.documentElement.style.scrollPaddingTop = px;
      document.documentElement.style.setProperty('--menuHeight', px);
    }

    window.addEventListener('DOMContentLoaded', applyMenuOffset);
    window.addEventListener('load', applyMenuOffset);
    window.addEventListener('resize', applyMenuOffset);
    window.setTimeout(applyMenuOffset, 50);
    window.setTimeout(applyMenuOffset, 400);
    document.fonts && document.fonts.ready.then(applyMenuOffset).catch(function () {});
  })();
</script>
